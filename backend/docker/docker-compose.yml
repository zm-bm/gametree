x-api-base: &api-base
  build:
    context: ..
    dockerfile: docker/Dockerfile
  expose:
    - "8080"
  environment:
    DATABASE_URL: rocksdb:///data/gametree.rocksdb
  volumes:
    - ../data:/data
  restart: unless-stopped

services:
  api:
    <<: *api-base
    container_name: gametree-api
    profiles: ["dev"]
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: rocksdb:///data/gametree.rocksdb
    volumes:
      - ../src:/app/src
      - ../data:/data
    command: uvicorn gametree_api.main:app --host 0.0.0.0 --port 8080 --reload --reload-dir /app/src

  api-prod:
    <<: *api-base
    container_name: gametree-api-prod
    profiles: ["prod"]
    environment:
      DATABASE_URL: rocksdb:///data/gametree.rocksdb
    command: uvicorn gametree_api.main:app --host 0.0.0.0 --port 8080

  nginx:
    image: nginx:1.27-alpine
    container_name: gametree-nginx
    profiles: ["prod"]
    depends_on:
      - api-prod
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
